name: main-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: main-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend · dotnet test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ListForge.sln

      - name: Test
        run: dotnet test ListForge.sln --no-restore --nologo

  frontend:
    name: frontend · typecheck + lint + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Typecheck
        run: pnpm --dir frontend typecheck

      - name: Lint (includes jsx-a11y)
        run: pnpm --dir frontend lint

      - name: Vitest
        run: pnpm --dir frontend test

  e2e:
    name: e2e · playwright
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            pnpm-lock.yaml

      - name: Install root dependencies (axe-core/playwright)
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: pnpm --dir frontend install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --dir frontend exec playwright install --with-deps chromium

      - name: Run Playwright
        run: pnpm --dir frontend e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14
          if-no-files-found: ignore
