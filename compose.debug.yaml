# Debug overlay: run the API in Debug configuration with vsdbg mounted, alongside postgres.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: listforge
      POSTGRES_PASSWORD: listforge
      POSTGRES_DB: listforge
    volumes:
      - listforge-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listforge -d listforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  listforgeapi:
    image: listforgeapi
    build:
      context: .
      dockerfile: src/ListForge.API/Dockerfile
      args:
        - configuration=Debug
    ports:
      - 5050:5050
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - ~/.vsdbg:/remote_debugger:rw
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  listforge-postgres-data:
